<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字人视频生成平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;line-height:1.6;color:#1e293b}
.app{min-height:100vh;padding:24px}
.container{max-width:1200px;margin:0 auto}
.header{text-align:center;padding:48px 24px;color:#fff}
.header__badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);padding:8px 16px;border-radius:100px;font-size:.875rem;font-weight:500;margin-bottom:20px}
.header__title{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,.2)}
.header__subtitle{font-size:1.25rem;opacity:.9;max-width:600px;margin:0 auto}
.main-card{background:#fff;border-radius:24px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1);overflow:hidden}
.card-header{background:linear-gradient(135deg,#f8fafc 0%,#f1f5f9 100%);padding:28px 32px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:16px}
.card-header__icon{width:48px;height:48px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff}
.card-header__title{font-size:1.5rem;font-weight:600}
.card-body{padding:32px}
.section{margin-bottom:40px}
.section:last-child{margin-bottom:0}
.section__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section__title{font-size:1.125rem;font-weight:600;display:flex;align-items:center;gap:10px}
.textarea-wrapper{position:relative}
.textarea{width:100%;min-height:200px;padding:20px;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem;font-family:inherit;resize:vertical;transition:all .2s;line-height:1.7;background:#fff}
.textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.1)}
.textarea-counter{position:absolute;bottom:12px;right:16px;font-size:.75rem;color:#94a3b8;background:#fff;padding:4px 8px;border-radius:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:12px;font-size:.9375rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn--primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn--primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,241,.35)}
.btn--ghost{background:transparent;color:#6366f1;padding:8px 16px}
.btn--ghost:hover{background:rgba(99,102,241,.1)}
.btn--lg{padding:16px 40px;font-size:1.125rem;border-radius:16px}
.btn--success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.avatar-card{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:20px 16px;cursor:pointer;transition:all .2s;text-align:center;position:relative}
.avatar-card:hover{border-color:#818cf8;transform:translateY(-4px);box-shadow:0 10px 15px -3px rgba(0,0,0,.1)}
.avatar-card.selected{border-color:#6366f1;background:linear-gradient(135deg,rgba(99,102,241,.05) 0%,rgba(139,92,246,.05) 100%);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.avatar-card.selected::after{content:'✓';position:absolute;top:12px;right:12px;width:24px;height:24px;background:#6366f1;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
.avatar-card__placeholder{width:80px;height:80px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff}
.avatar-card__name{font-size:1rem;font-weight:600;margin-bottom:4px}
.avatar-card__desc{font-size:.8125rem;color:#94a3b8}
.avatar-loading,.avatar-empty{grid-column:1/-1;text-align:center;padding:48px 24px;color:#94a3b8}
.submit-section{margin-top:40px;text-align:center}
.submit-hint{margin-top:12px;font-size:.875rem;color:#94a3b8}
.status-panel{margin-top:24px;background:#f8fafc;border-radius:16px;padding:24px;display:none}
.status-panel.active{display:block;animation:fadeIn .3s}
.status-panel__header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.spinner{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
.status-text{font-size:1.125rem;font-weight:600}
.status-subtext{font-size:.875rem;color:#94a3b8;margin-top:4px}
.progress-bar{width:100%;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:16px}
.progress-fill{height:100%;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:3px;animation:indeterminate 1.5s ease-in-out infinite}
.video-result{margin-top:24px;text-align:center;display:none}
.video-result.active{display:block;animation:fadeIn .3s}
.video-result video{width:100%;max-width:640px;border-radius:16px;box-shadow:0 10px 15px -3px rgba(0,0,0,.1);margin-bottom:16px}
.error-box{margin-top:16px;padding:16px 20px;background:#fef2f2;border:1px solid #fecaca;border-left:4px solid #ef4444;border-radius:12px;color:#dc2626;font-size:.9375rem;display:none}
.error-box.active{display:block;animation:fadeIn .3s}
.queue-info{margin-top:12px;padding:12px 16px;background:#f0f9ff;border-radius:8px;font-size:.875rem;color:#0369a1;display:none}
.footer{text-align:center;padding:32px 24px;color:rgba(255,255,255,.7);font-size:.875rem}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes indeterminate{0%{width:0%;margin-left:0%}50%{width:40%;margin-left:30%}100%{width:0%;margin-left:100%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.app{padding:16px}.header{padding:32px 16px}.header__title{font-size:1.75rem}.card-body{padding:20px}.avatar-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
</style>
</head>
<body>
<div class="app">
<div class="container">
<header class="header">
<div class="header__badge"><span>✨</span><span>AI 驱动</span></div>
<h1 class="header__title">数字人视频生成平台</h1>
<p class="header__subtitle">智能文案生成 · 多样数字人形象 · 一键创建专业视频内容</p>
</header>

<main class="main-card">
<div class="card-header">
<div class="card-header__icon">🎬</div>
<h2 class="card-header__title">创建视频</h2>
</div>
<div class="card-body">

<section class="section">
<div class="section__header">
<h3 class="section__title"><span>📝</span> 视频文案</h3>
<button class="btn btn--ghost" onclick="toggleAI()">✨ AI 生成</button>
</div>
<div class="textarea-wrapper">
<textarea class="textarea" id="textInput" placeholder="请输入视频文案内容，或使用 AI 智能生成..." maxlength="2000" oninput="updateCounter()"></textarea>
<span class="textarea-counter" id="textCounter">0 / 2000</span>
</div>
<div id="aiPanel" style="display:none;margin-top:20px;padding:24px;background:linear-gradient(135deg,#faf5ff,#f3e8ff);border:2px dashed #c4b5fd;border-radius:16px">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
<div style="width:40px;height:40px;background:linear-gradient(135deg,#8b5cf6,#a855f7);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.25rem">🤖</div>
<h4 style="font-size:1.125rem;font-weight:600">AI 文案生成</h4>
</div>
<div style="margin-bottom:12px">
<label style="font-size:.875rem;font-weight:500;color:#64748b;display:block;margin-bottom:6px">生成提示 <span style="color:#ef4444">*</span></label>
<input id="promptInput" type="text" class="form-input" placeholder="例如：写一段关于人工智能发展的视频文案，200字左右" style="width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:.9375rem">
</div>
<div style="display:flex;gap:12px;margin-top:16px">
<button class="btn btn--success" onclick="generateText()">🚀 生成文案</button>
<button class="btn btn--ghost" onclick="toggleAI()">取消</button>
</div>
</div>
</section>

<section class="section">
<div class="section__header">
<h3 class="section__title"><span>👤</span> 选择数字人</h3>
<button class="btn btn--ghost" onclick="location.href='/create-avatar'">+ 新建数字人</button>
</div>
<div class="avatar-grid" id="avatarGrid">
<div class="avatar-loading"><div class="spinner"></div><p style="margin-top:12px">正在加载数字人列表...</p></div>
</div>
</section>

<section class="section">
<div class="section__header">
  <h3 class="section__title"><span>⚡</span> 语速控制</h3>
</div>
<div style="padding:4px 0">
  <div style="display:flex;justify-content:space-between;font-size:.8125rem;color:#94a3b8;margin-bottom:8px">
    <span>慢 0.5x</span>
    <span>正常 1.0x</span>
    <span>快 2.0x</span>
  </div>
  <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0"
         style="width:100%;accent-color:#6366f1"
         oninput="document.getElementById('speedLabel').textContent = this.value + 'x'">
  <div style="text-align:center;font-size:.9375rem;font-weight:600;color:#6366f1;margin-top:4px">
    <span id="speedLabel">1.0x</span>
  </div>
</div>
</section>

<section class="submit-section">
<button class="btn btn--primary btn--lg" id="submitBtn" onclick="submitTask()">🎬 提交任务</button>
<p class="submit-hint" id="hintText">请先输入文案内容</p>
</section>

<div class="status-panel" id="statusPanel">
<div class="status-panel__header">
<div class="spinner" id="statusSpinner"></div>
<div>
<div class="status-text" id="statusText">正在提交任务...</div>
<div class="status-subtext" id="statusSubtext">请稍候</div>
</div>
</div>
<div class="queue-info" id="queueInfo"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="video-result" id="videoResult">
<video id="videoPlayer" controls></video><br>
<a class="btn btn--primary" id="downloadLink" download>📥 下载视频</a>
</div>
<div class="error-box" id="errorBox"></div>
</div>

</div>
</main>

<footer class="footer"><p>© 2026 数字人视频生成平台 · 基于 SoulX-FlashHead + LongCat-AudioDiT</p></footer>
</div>
</div>
<style>.form-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}</style>
<script>
const API_BASE = ''
let selectedAvatarId = null
let currentTaskId = null
let pollInterval = null

function updateCounter() {
  const el = document.getElementById('textInput')
  document.getElementById('textCounter').textContent = el.value.length + ' / 2000'
}

function toggleAI() {
  const p = document.getElementById('aiPanel')
  p.style.display = p.style.display === 'none' ? 'block' : 'none'
}

async function generateText() {
  const prompt = document.getElementById('promptInput').value.trim()
  if (!prompt) { alert('请输入生成提示'); return }
  const btn = event.target; btn.disabled = true; btn.textContent = '生成中...'
  try {
    const resp = await fetch(API_BASE + '/api/generate_text', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt, model_id: 'qwen-turbo'})
    })
    const data = await resp.json()
    document.getElementById('textInput').value = data.data.text
    updateCounter()
    toggleAI()
  } catch(e) {
    alert('生成失败: ' + e.message)
  }
  btn.disabled = false; btn.innerHTML = '🚀 生成文案'
}

async function loadAvatars() {
  try {
    const resp = await fetch(API_BASE + '/api/avatars')
    const avatars = await resp.json()
    const grid = document.getElementById('avatarGrid')
    const list = Array.isArray(avatars) ? avatars : (avatars.data || [])
    if (list.length === 0) {
      grid.innerHTML = '<div class="avatar-empty"><div style="font-size:3rem;margin-bottom:16px">👤</div><p>暂无可用数字人，请先创建</p></div>'
      return
    }
    grid.innerHTML = list.map(a => `
      <div class="avatar-card" data-id="${a.id||a.avatar_id}" onclick="selectAvatar(this)">
        <div class="avatar-card__placeholder">👤</div>
        <div class="avatar-card__name">${escapeHtml(a.name||'')}</div>
        <div class="avatar-card__desc">${escapeHtml(a.description||'暂无描述')}</div>
      </div>
    `).join('')
  } catch(e) {
    document.getElementById('avatarGrid').innerHTML = '<div class="avatar-empty"><p>加载失败</p></div>'
  }
}

function selectAvatar(el) {
  document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  selectedAvatarId = el.dataset.id
  updateHint()
}

function escapeHtml(t) {
  const d = document.createElement('div'); d.textContent = t; return d.innerHTML
}

function updateHint() {
  const text = document.getElementById('textInput').value.trim()
  const hint = document.getElementById('hintText')
  if (!text) hint.textContent = '请先输入文案内容'
  else if (!selectedAvatarId) hint.textContent = '请选择数字人'
  else hint.textContent = '✓ 可以提交了'
}

document.getElementById('textInput').addEventListener('input', updateHint)

async function submitTask() {
  const text = document.getElementById('textInput').value.trim()
  if (!text) { alert('请输入视频文案'); return }
  if (!selectedAvatarId) { alert('请选择数字人'); return }

  const btn = document.getElementById('submitBtn')
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 提交中...'
  resetStatus()

  try {
    const speed = parseFloat(document.getElementById('speedSlider').value) || 1.0
    const resp = await fetch(API_BASE + '/api/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text, avatar_id: selectedAvatarId, speed})
    })
    if (!resp.ok) throw new Error((await resp.json()).detail || '提交失败')
    const result = await resp.json()
    currentTaskId = result.task_id
    document.getElementById('statusPanel').classList.add('active')
    document.getElementById('statusText').textContent = '排队中...'
    document.getElementById('statusSubtext').textContent = '正在等待处理'
    startPolling()
  } catch(e) {
    showError(e.message)
    btn.disabled = false; btn.innerHTML = '🎬 提交任务'
  }
}

function resetStatus() {
  document.getElementById('statusPanel').classList.remove('active')
  document.getElementById('videoResult').classList.remove('active')
  document.getElementById('errorBox').classList.remove('active')
  document.getElementById('queueInfo').style.display = 'none'
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval)
  pollInterval = setInterval(async () => {
    try {
      const resp = await fetch(API_BASE + '/api/status/' + currentTaskId)
      if (!resp.ok) return
      const task = await resp.json()
      updateStatus(task)
    } catch(e) { console.error(e) }
  }, 2000)
}

function updateStatus(task) {
  const st = document.getElementById('statusText')
  const sub = document.getElementById('statusSubtext')
  const qi = document.getElementById('queueInfo')

  if (task.status === 'queued') {
    st.textContent = '排队中...'
    sub.textContent = '等待处理'
    qi.style.display = 'block'
    qi.textContent = '📋 任务已进入队列'
    return
  }
  if (task.status === 'processing') {
    st.textContent = '正在生成视频...'
    sub.textContent = '正在生成语音和视频，请稍候'
    qi.style.display = 'none'
    return
  }
  clearInterval(pollInterval); pollInterval = null
  document.getElementById('submitBtn').disabled = false
  document.getElementById('submitBtn').innerHTML = '🎬 提交任务'
  qi.style.display = 'none'

  if (task.status === 'completed') {
    document.getElementById('statusSpinner').style.display = 'none'
    document.getElementById('progressFill').style.display = 'none'
    st.textContent = '✅ 视频生成完成！'
    sub.textContent = ''
    if (task.video_url) {
      const url = task.video_url.startsWith('http') ? task.video_url : API_BASE + task.video_url
      document.getElementById('videoPlayer').src = url
      document.getElementById('downloadLink').href = url
      document.getElementById('videoResult').classList.add('active')
    }
  } else if (task.status === 'failed') {
    showError(task.error || '生成失败')
    document.getElementById('statusSpinner').style.display = 'none'
    document.getElementById('progressFill').style.display = 'none'
    st.textContent = '❌ 生成失败'
    sub.textContent = ''
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox')
  el.textContent = msg
  el.classList.add('active')
}

loadAvatars()
</script>
</body>
</html>
